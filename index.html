<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Lensing Playground</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0b0f2a 0%, #000000 100%);
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #title {
      position: fixed;
      top: 15px;
      left: 15px;
      color: white;
      font-size: 18px;
      z-index: 10;
      opacity: 0.85;
    }

    #lens {
      position: fixed;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid white;
      background: rgba(255,255,255,0.05);
      cursor: grab;
      z-index: 20;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

<div id="title">🌌 Lensing Playground — physics v2</div>
<div id="lens"></div>

<canvas id="space"></canvas>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ----------------------
// STAR FIELD
// ----------------------
const stars = [];
const STAR_COUNT = 400;

for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height
  });
}

// ----------------------
// LENS
// ----------------------
const lens = document.getElementById("lens");
let lensX = canvas.width / 2;
let lensY = canvas.height / 2;
let dragging = false;

// place lens
function updateLens() {
  lens.style.left = lensX + "px";
  lens.style.top = lensY + "px";
}

updateLens();

lens.addEventListener("mousedown", () => dragging = true);
window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  lensX = e.clientX;
  lensY = e.clientY;
  updateLens();
});

// ----------------------
// LENSING PHYSICS (simple)
// ----------------------
// deflection ~ 1 / r
const strength = 8000;

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let s of stars) {

    let dx = s.x - lensX;
    let dy = s.y - lensY;

    let r2 = dx*dx + dy*dy;
    let r = Math.sqrt(r2) + 0.0001;

    // gravitational lens deflection (toy model)
    let factor = strength / r2;

    let offsetX = dx * factor;
    let offsetY = dy * factor;

    let x = s.x + offsetX;
    let y = s.y + offsetY;

    // draw star
    ctx.fillStyle = "white";
    ctx.fillRect(x, y, 2, 2);
  }

  requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
