<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Lensing Playground</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0b0f2a 0%, #000000 100%);
      font-family: Arial, sans-serif;
      color: white;
    }

    #title {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      opacity: 0.9;
      z-index: 10;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
    }

    #lens {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid white;
      top: 200px;
      left: 200px;
      cursor: grab;
      z-index: 20;
    }

    #test {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 99999;
      background: yellow;
      color: black;
      padding: 5px 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div id="test">LIVE UPDATE TEST 🚨</div>

  <div id="title">🌌 Lehellooooayground — prototype</div>

  <div id="lens"></div>

  <script>
    // ------------------------
    // STARFIELD
    // ------------------------
    for (let i = 0; i < 250; i++) {
      const star = document.createElement("div");
      star.className = "star";
      star.style.left = Math.random() * window.innerWidth + "px";
      star.style.top = Math.random() * window.innerHeight + "px";
      star.style.opacity = Math.random();
      document.body.appendChild(star);
    }

    // ------------------------
    // DRAGGABLE LENS (basic)
    // ------------------------
    const lens = document.getElementById("lens");
    let dragging = false;

    lens.addEventListener("mousedown", () => dragging = true);
    window.addEventListener("mouseup", () => dragging = false);

    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      lens.style.left = (e.clientX - 60) + "px";
      lens.style.top = (e.clientY - 60) + "px";
    });
  </script>

</body>
</html>
